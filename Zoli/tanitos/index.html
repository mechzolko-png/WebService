<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <style>
      .texted {
        text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
      }

      body {
        background-color: rgb(28, 28, 28);
        color: white;
        font-family:
          "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
        margin: 0;
      }

      header {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 100vh;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
          url(../kepek/hajo.jpg);
        background-size: cover;
      }

      @media (max-width: 786px) {
        header {
          display: grid;
          /* Majd itt lesz a header mobil CSS-e. */
        }

        body {
          margin: 0;
        }
      }

      .containerh {
        background-color: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 30px;
        margin: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(12px);
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.5);
      }

      h1 {
        font-size: 48px;
        text-shadow: 10px 10px 10px rgba(0, 0, 0, 0.5);
      }

      .cont-button {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(15vh);
        padding-top: 50vh;
      }

      .btn {
        font-size: xx-large;
        border: 5px solid white;
        border-radius: 10px;
        padding: 10px;
        padding-left: 20px;
        padding-right: 20px;
        box-shadow: inset 0px 0px 2px 2px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
      }

      section {
        background-color: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 30px;
        margin: 20px;
        backdrop-filter: blur(12px);
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.5);
      }

      .containert {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr;
      }

      .card {
        border-left: 5px solid aqua;
      }

      .on {
        padding-left: 10px;
      }

    </style>
  </head>
  <body>
    <header>
      <div class="containerh">
        <h1>
          Weboldal <br />
          címe
        </h1>
      </div>

      <div class="cont-button">
        <div class="btn texted">Hívás</div>
        <div class="btn texted">e-mail</div>
      </div>
    </header>

    <nav></nav>

    <main> 
      <section class="trust">
        <div class="containert">
          <div class="card" id="card1">
            <div class="on">
              <h3>Megbízhatóság</h3>
              <p>Több nagy vállalat bizalmát nyerte el a szolgáltatásunk</p>
            </div>
          </div>

          <div class="card" id="card2">
            <div class="on">
              <h3>Megbízhatóság</h3>
              <p>Több nagy vállalat bizalmát nyerte el a szolgáltatásunk</p>
            </div>
          </div>

          <div class="card" id="card3">
            <div class="on">
              <h3>Megbízhatóság</h3>
              <p>Több nagy vállalat bizalmát nyerte el a szolgáltatásunk</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
